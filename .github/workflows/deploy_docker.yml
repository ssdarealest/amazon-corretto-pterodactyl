name: build and update java_coretto

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 1,15 * *" # bi-weekly on 1st and 15th calendar day at 15:00
  push:
    branches:
      - main
    paths:
      - docker/**

permissions:
  actions: read
  packages: write

concurrency:
  group: java-corretto-${{ github.ref }}-1
  cancel-in-progress: true

jobs:
  build_and_push:
    name: "java_${{ matrix.tag }}_corretto"
    runs-on: ubuntu-latest
    env:
      DOCKER_CLIENT_TIMEOUT: 120
      COMPOSE_HTTP_TIMEOUT: 120
    strategy:
      fail-fast: false
      matrix:
        tag:
          - 8
          - 11
          - 17
          - 19
          - 20
          - 21
          - 25
          - 26
    steps:
      - name: Git checkout for Github repository workspace
        uses: actions/checkout@v4

      - name: Setup QEMU for multiarch builds
        uses: docker/setup-qemu-action@v4
        with:
          image: docker.io/tonistiigi/binfmt:qemu-v10.1.3-60
          platforms: arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug

      - name: Login to registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          platforms: linux/amd64,linux/arm64
          file: ./docker/${{ matrix.tag }}/Dockerfile
          pull: true
          push: true
          tags: ghcr.io/ssdarealest/corretto-${{ matrix.tag }}-pterodactyl:latest
